site_name: zmqtt
site_description: Pure asyncio MQTT 3.1.1 / 5.0 client
site_url: https://borisalekseev.github.io/zmqtt/
repo_url: https://github.com/borisalekseev/zmqtt
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
  palette:
    scheme: slate
    primary: indigo
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Connecting: connecting.md
  - Publishing: publishing.md
  - Subscribing: subscribing.md
  - Advanced:
    - Manual Ack: advanced/manual-ack.md
    - Reconnection: advanced/reconnection.md
    - Ping: advanced/ping.md
    - MQTT 5.0: advanced/mqtt5.md
    - Backpressure: advanced/backpressure.md
    - Scaling: advanced/scaling.md
  - Error Handling: error-handling.md
  - Logging: logging.md
  - API Reference: api-reference.md
  - Changelog: changelog.md
